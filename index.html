<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="/manifest.json" />
    <title>ProLine Garage Door NJ</title>

    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />

    <!-- Preload hero image FIRST — this is the LCP element -->
    <link rel="preload" as="image" href="https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1400&q=75&auto=format&fit=crop" fetchpriority="high" />
    <!-- Preload logo -->
    <link rel="preload" as="image" href="https://media.base44.com/images/public/6940c0d91636ce363ecbf035/0f4671081_WebsiteLOGO.png" />

    <!-- Capture tracking params BEFORE React mounts (lightweight, no network) -->
    <script>
      (function () {
        // URL redirect handler
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get("redirect");
        if (redirect) {
          var redirectUrl = decodeURIComponent(redirect);
          var trackingKeys = ['gclid','gbraid','wbraid','utm_source','utm_medium','utm_campaign','utm_term','utm_content','gad_source'];
          var trackingParams = [];
          trackingKeys.forEach(function(key) {
            var val = params.get(key);
            if (val) trackingParams.push(key + '=' + encodeURIComponent(val));
          });
          if (trackingParams.length > 0) {
            var sep = redirectUrl.indexOf('?') >= 0 ? '&' : '?';
            redirectUrl = redirectUrl + sep + trackingParams.join('&');
          }
          window.history.replaceState(null, "", redirectUrl);
        }

        // Store tracking params for later use
        var keys = ['gclid','gbraid','wbraid','gad_source','utm_source','utm_medium','utm_campaign','utm_term','utm_content'];
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('_gads_tracking') || '{}'); } catch(e) {}
        var tracking = {};
        keys.forEach(function(k) {
          var v = params.get(k) || stored[k];
          if (v) tracking[k] = v;
        });
        window._trackingParams = tracking;

        // Stub gtag so calls before load don't throw
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        window.gtag = gtag;
        gtag('js', new Date());
      })();
    </script>
  </head>
  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-MZX9LG3J"
    height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Load all analytics AFTER page load to avoid blocking FCP/TBT -->
    <script>
      window.addEventListener('load', function() {
        // Google Tag Manager
        (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
        new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
        j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
        'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-MZX9LG3J');

        // GA4
        var ga4 = document.createElement('script');
        ga4.async = true;
        ga4.src = 'https://www.googletagmanager.com/gtag/js?id=G-L0JJTZPHED';
        document.head.appendChild(ga4);
        ga4.onload = function() {
          var configPayload = {
            'allow_google_signals': true,
            'allow_ad_personalization_signals': true,
            'url_passthrough': true,
            'ads_data_redaction': false,
            'send_page_view': false
          };
          if (window._trackingParams && window._trackingParams.gclid) {
            configPayload.gclid = window._trackingParams.gclid;
          }
          gtag('config', 'G-L0JJTZPHED', configPayload);
        };

        // Google Ads
        var aw = document.createElement('script');
        aw.async = true;
        aw.src = 'https://www.googletagmanager.com/gtag/js?id=AW-17876163238';
        document.head.appendChild(aw);
        aw.onload = function() {
          gtag('config', 'AW-17876163238', {
            'url_passthrough': true,
            'allow_enhanced_conversions': true
          });
        };
      });
    </script>
  </body>
</html>
