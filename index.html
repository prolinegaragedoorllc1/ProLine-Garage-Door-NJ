    <!-- Redirect handler (inline, must run early) -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get("redirect");
        if (redirect) {
          var redirectUrl = decodeURIComponent(redirect);
          var trackingParams = [];
          var trackingKeys = ['gclid','gbraid','wbraid','utm_source','utm_medium','utm_campaign','utm_term','utm_content','gad_source'];
          trackingKeys.forEach(function(key) {
            var val = params.get(key);
            if (val) trackingParams.push(key + '=' + encodeURIComponent(val));
          });
          if (trackingParams.length > 0) {
            var sep = redirectUrl.indexOf('?') >= 0 ? '&' : '?';
            redirectUrl = redirectUrl + sep + trackingParams.join('&');
          }
          window.history.replaceState(null, "", redirectUrl);
        }
      })();
    </script>

    <!-- Tracking params capture (inline, must run before React) -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      (function() {
        var keys = ['gclid','gbraid','wbraid','gad_source','utm_source','utm_medium','utm_campaign','utm_term','utm_content'];
        var params = new URLSearchParams(window.location.search);
        var stored = {};
        try { stored = JSON.parse(localStorage.getItem('_gads_tracking') || '{}'); } catch(e) {}
        var tracking = {};
        keys.forEach(function(k) {
          var v = params.get(k) || stored[k];
          if (v) tracking[k] = v;
        });
        window._trackingParams = tracking;
      })();
    </script>

      gtag('js', new Date());

        'allow_ad_personalization_signals': true,
        'url_passthrough': true,
        'ads_data_redaction': false,
        'send_page_view': false
      };
      if (window._trackingParams && window._trackingParams.gclid) {
        ga4Config.gclid = window._trackingParams.gclid;
      }
      gtag('config', 'G-L0JJTZPHED', ga4Config);
      gtag('config', 'AW-17876163238', {
        'url_passthrough': true,
